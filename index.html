<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagem & Ação</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  min-height:100vh;
  padding:20px;
  box-sizing:border-box;

  width:90vw;
  max-width:320px;
  height:480px;
  perspective:1000px;
  margin-bottom:30px;

.inner {
  width:100%;
  height:100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position:relative;
}

.flipped {
  transform: rotateY(180deg);
}

.front, .back {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;

  justify-content:center;

  background:white;
  transform: rotateY(180deg);
  padding:30px 25px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border: 4px solid #d4af37;
}

.linha {
  display:flex;
  align-items:center;
  margin:10px 0;
  padding:0 5px;
}

.letra {
  width:30px;
  height:30px;
  border-radius:50%;
  background:#d4af37;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  flex-shrink:0;

.palavra {
  flex:1;

  padding-bottom:5px;

}

  display:flex;
  gap:20px;
}

button {
  padding:12px 20px;
  border:none;

  cursor:pointer;
  font-weight:bold;
}

.start {
  background:#00c853;
  color:white;
}

  background:#2962ff;
  color:white;
}

.timer {
  color:white;
  margin-top:20px;
  font-size:18px;
}

@media (max-width: 400px){
  .card {
    height:440px;
  }

  .palavra {
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="card" onclick="flipCard()">
  <div id="cardInner" class="inner">
    <div class="front">IMAGEM & AÇÃO 🎭</div>
    <div id="cardContent" class="back"></div>
  </div>
</div>

<div class="controls">
  <button class="start" onclick="startTimer(event)">▶️ Iniciar</button>
  <button class="next" onclick="nextCard(event)">➡️ Próxima</button>
</div>

<div class="timer" id="timer">⏱️ 60s</div>

<audio id="alarm">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<audio id="warning">
  <source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>

let time = 60;
let interval;

// LISTAS ORIGINAIS
const pessoasBase = ["NEYMAR","PELÉ","ANITTA","BEYONCÉ","MICHAEL JACKSON"];
const objetosBase = ["CADEIRA","CELULAR","PORTA","GARRAFA","ÓCULOS"];
const acoesBase = ["CORRER","SENTAR","DEITAR","ANDAR","PULAR"];
const dificilBase = ["GRAVIDADE","INVISÍVEL","ILUSÃO","TEMPO","ESPAÇO"];
const lazerBase = ["FUTEBOL","NADAR","VIAJAR","TRUCO"];
const mixBase = ["CASTELO","LABIRINTO","ESTÁTUA","PINTURA"];

// CÓPIAS QUE SERÃO MODIFICADAS
let pessoas = [...pessoasBase];
let objetos = [...objetosBase];
let acoes = [...acoesBase];
let dificil = [...dificilBase];
let lazer = [...lazerBase];
let mix = [...mixBase];

function resetWords(){
  pessoas = [...pessoasBase];
  objetos = [...objetosBase];
  acoes = [...acoesBase];
  dificil = [...dificilBase];
  lazer = [...lazerBase];
  mix = [...mixBase];
}

function startTimer(e){
  e.stopPropagation();

  const alarm = document.getElementById("alarm");
  const warning = document.getElementById("warning");

  alarm.play().then(()=>alarm.pause());
  warning.play().then(()=>warning.pause());

  if(interval) return;

  interval = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "⏱️ " + time + "s";

    if(time <= 10 && time > 0){
      warning.currentTime = 0;
      warning.play();
    }

    if(time <= 0){
      clearInterval(interval);
      interval = null;
      document.getElementById("timer").innerText = "⏱️ TEMPO!";
      alarm.currentTime = 0;
      alarm.play();
    }
  },1000);
}

function resetTimer(){
  clearInterval(interval);
  interval = null;
  time = 60;
  document.getElementById("timer").innerText = "⏱️ 60s";
}

function randomItem(arr){
  if(arr.length === 0) return "ACABOU";
  const index = Math.floor(Math.random() * arr.length);
  const item = arr[index];
  arr.splice(index, 1); // REMOVE para não repetir
  return item;
}

function linha(letra, palavra){
  return `
  <div class="linha">
    <div class="letra">${letra}</div>
    <div class="palavra">${palavra}</div>
  </div>`;
}

function generateCard(){
  return `
    ${linha("P", randomItem(pessoas))}
    ${linha("O", randomItem(objetos))}
    ${linha("A", randomItem(acoes))}
    ${linha("D", randomItem(dificil))}
    ${linha("L", randomItem(lazer))}
    ${linha("M", randomItem(mix))}
  `;
}

function flipCard(){
  document.getElementById("cardInner").classList.toggle("flipped");
}

function nextCard(e){
  if(e) e.stopPropagation();

  resetTimer();

  // se acabar palavras, reseta tudo
  if(pessoas.length === 0) resetWords();

  const cardContent = document.getElementById("cardContent");
  const cardInner = document.getElementById("cardInner");

  cardInner.classList.remove("flipped");
  cardContent.innerHTML = generateCard();
}

nextCard();

</script>

</body>
</html>
