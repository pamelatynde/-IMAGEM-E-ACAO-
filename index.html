<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagem & Ação</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card {
  width:320px;
  height:480px;
  perspective:1000px;
  margin-bottom:60px;
}

.inner {
  width:100%;
  height:100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position:relative;
}

.flipped {
  transform: rotateY(180deg);
}

.front, .back {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.front {
  background:white;
  color:black;
  font-size:26px;
  font-weight:bold;
}

.back {
  background:white;
  color:black;
  transform: rotateY(180deg);
  flex-direction:column;
  align-items:flex-start;
  font-size:18px;
  line-height:1.8;
}

.controls {
  display:flex;
  gap:20px;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

.start {
  background:#00c853;
  color:white;
}

.next {
  background:#2962ff;
  color:white;
}

.timer {
  color:white;
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card" onclick="flipCard()">
  <div id="cardInner" class="inner">
    <div class="front">IMAGEM & AÇÃO</div>
    <div id="cardContent" class="back"></div>
  </div>
</div>

<div class="controls">
  <button class="start" onclick="startTimer(event)">▶️ Iniciar</button>
  <button class="next" onclick="nextCard(event)">➡️ Próxima</button>
</div>

<div class="timer" id="timer">⏱️ 60s</div>

<audio id="alarm">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<script>

let usedWords = new Set();
let time = 60;
let interval;

function startTimer(e){
  e.stopPropagation();

  if(interval) return;

  interval = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "⏱️ " + time + "s";

    if(time <= 0){
      clearInterval(interval);
      interval = null;
      document.getElementById("timer").innerText = "⏱️ TEMPO!";
      document.getElementById("alarm").play();
    }
  },1000);
}

function resetTimer(){
  clearInterval(interval);
  interval = null;
  time = 60;
  document.getElementById("timer").innerText = "⏱️ 60s";
}

function randomItem(arr){
  let item;
  let attempts = 0;

  do {
    item = arr[Math.floor(Math.random()*arr.length)];
    attempts++;
  } while(usedWords.has(item) && attempts < 50);

  usedWords.add(item);
  return item;
}

// P (completo como você pediu)
const pessoas = [
"NEYMAR","PELÉ","ANITTA","BEYONCÉ","MICHAEL JACKSON",
"REI","PRESIDENTE","MÉDICO","PROFESSOR",
"LEÃO","GATO","CACHORRO","ELEFANTE","TIGRE",
"BRASIL","FRANÇA","JAPÃO","ARGENTINA","RECIFE",
"SHOPPING","HOSPITAL","ESCOLA","CEMITÉRIO","AEROPORTO"
];

const objetos = [
"CADEIRA","CELULAR","PORTA","GARRAFA","ÓCULOS","CHAVE","MESA","MOCHILA"
];

const acoes = [
"CORRER","SENTAR","DEITAR","ANDAR","PULAR","SUBIR ESCADA","ABRIR PORTA"
];

const dificil = [
"GRAVIDADE","INVISÍVEL","ILUSÃO","TEMPO","ESPAÇO","EQUILÍBRIO","TONELADA"
];

const lazer = [
"CHUTEIRA","TRUCO","ESCONDE-ESCONDE","FUTEBOL","NADAR","VIAJAR"
];

const mix = [
"QUADRADO","CASTELO","CALDEIRÃO","PINTURA","ESPORA","ESTÁTUA","LABIRINTO"
];

function generateCard(){
  return `
P - ${randomItem(pessoas)}<br>
O - ${randomItem(objetos)}<br>
A - ${randomItem(acoes)}<br>
D - ${randomItem(dificil)}<br>
L - ${randomItem(lazer)}<br>
M - ${randomItem(mix)}
`;
}

function flipCard(){
  document.getElementById("cardInner").classList.toggle("flipped");
}

function nextCard(e){
  if(e) e.stopPropagation();

  resetTimer();

  const cardContent = document.getElementById("cardContent");
  const cardInner = document.getElementById("cardInner");

  cardInner.classList.remove("flipped");

  let novaCarta = generateCard();

  // GARANTE QUE NUNCA FIQUE VAZIO
  if(!novaCarta || novaCarta.trim() === ""){
    novaCarta = "ERRO AO GERAR CARTA";
  }

  cardContent.innerHTML = novaCarta;
}

// swipe
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50){
    nextCard({stopPropagation:()=>{}});
  }
});

nextCard();

</script>

</body>
</html>
